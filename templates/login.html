<!DOCTYPE html>
<html>
<head>
    <title>Login ERP</title>
    <style>
        body {
            background: #0a6ed1;
            font-family: Arial;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .login-box {
            background: white;
            padding: 40px;
            border-radius: 8px;
            width: 300px;
        }

        button {
            background: #0a6ed1;
            color: white;
            border: none;
            padding: 8px;
            width: 100%;
        }
    </style>
</head>
<body>

<div class="login-box">
    <h2>ERP Premium</h2>
    <form method="post">
        Usuário:<br>
        <input name="user"><br>
        Senha:<br>
        <input name="pass" type="password"><br><br>
        <button>Entrar</button>
    </form>
</div>

</body>
</html>
